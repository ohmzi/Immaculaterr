name: "CI: quality and security"

on:
  pull_request:
    branches:
      - develop
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
  push:
    branches:
      - develop
      - master
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  quality-and-security:
    name: quality-and-security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: AJV safety check
        run: npm run security:check:ajv

      - name: Dependency audit
        run: npm run security:audit:prod
