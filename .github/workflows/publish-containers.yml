name: Publish containers (GHCR + Docker Hub)

on:
  pull_request:
    branches:
      - develop
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
      - closed
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  # NOTE: Must be a single expression; string concatenation like ${{ a }}-${{ b }} breaks workflow parsing.
  group: ${{ format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: false

jobs:
  pr-build-check:
    name: PR docker build check
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate Docker Hub HTTP+HTTPS stack compose file
        shell: bash
        run: |
          set -euo pipefail
          IMM_IMAGE=ohmzii/immaculaterr IMM_TAG=latest \
            docker compose -f docker/immaculaterr/docker-compose.dockerhub.yml config >/dev/null

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute build metadata
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(
            node -e "const fs=require('fs');const s=fs.readFileSync('apps/api/src/version.ts','utf8');const m=s.match(/APP_VERSION\\s*=\\s*'([^']+)'/);process.stdout.write((m&&m[1]?m[1].trim():'')||'0.0.0.0')"
          )"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          {
            echo "version=${VERSION}"
            echo "build_time=${BUILD_TIME}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build container (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/immaculaterr/Dockerfile
          pull: true
          push: false
          platforms: linux/amd64,linux/arm64
          outputs: type=cacheonly
          labels: |
            org.opencontainers.image.title=Immaculaterr
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.created=${{ steps.vars.outputs.build_time }}
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.version }}
            APP_BUILD_SHA=${{ github.event.pull_request.head.sha }}
            APP_BUILD_TIME=${{ steps.vars.outputs.build_time }}

  build-and-push:
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop' && github.event.pull_request.base.ref == 'master' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      is_beta: ${{ steps.vars.outputs.is_beta }}
      ghcr_image: ${{ steps.vars.outputs.ghcr_image }}
      dockerhub_image: ${{ steps.vars.outputs.dockerhub_image }}
      build_time: ${{ steps.vars.outputs.build_time }}
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Validate Docker Hub HTTP+HTTPS stack compose file
        shell: bash
        run: |
          set -euo pipefail
          IMM_IMAGE=ohmzii/immaculaterr IMM_TAG=latest \
            docker compose -f docker/immaculaterr/docker-compose.dockerhub.yml config >/dev/null

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub (optional)
        if: ${{ env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(
            node -e "const fs=require('fs');const s=fs.readFileSync('apps/api/src/version.ts','utf8');const m=s.match(/APP_VERSION\\s*=\\s*'([^']+)'/);process.stdout.write((m&&m[1]?m[1].trim():'')||'0.0.0.0')"
          )"

          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/immaculaterr"
          DOCKERHUB_IMAGE="docker.io/ohmzii/immaculaterr"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          IS_BETA=false
          if [[ "${VERSION,,}" == *beta* ]]; then
            IS_BETA=true
          fi

          {
            echo "version=${VERSION}"
            echo "is_beta=${IS_BETA}"
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "dockerhub_image=${DOCKERHUB_IMAGE}"
            echo "build_time=${BUILD_TIME}"

            echo "tags<<EOF"
            if [[ "${IS_BETA}" != "true" ]]; then
              echo "${GHCR_IMAGE}:latest"
            fi
            echo "${GHCR_IMAGE}:${VERSION}"
            echo "${GHCR_IMAGE}:v${VERSION}"
            if [[ -n "${DOCKERHUB_TOKEN:-}" && -n "${DOCKERHUB_USERNAME:-}" ]]; then
              if [[ "${IS_BETA}" != "true" ]]; then
                echo "${DOCKERHUB_IMAGE}:latest"
              fi
              echo "${DOCKERHUB_IMAGE}:v${VERSION}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
        env:
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/immaculaterr/Dockerfile
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Immaculaterr
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.merge_commit_sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.created=${{ steps.vars.outputs.build_time }}
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.version }}
            APP_BUILD_SHA=${{ github.event.pull_request.merge_commit_sha }}
            APP_BUILD_TIME=${{ steps.vars.outputs.build_time }}

  build-and-push-beta:
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop' && github.event.pull_request.head.ref != 'master' }}
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Validate Docker Hub HTTP+HTTPS stack compose file
        shell: bash
        run: |
          set -euo pipefail
          IMM_IMAGE=ohmzii/immaculaterr IMM_TAG=latest \
            docker compose -f docker/immaculaterr/docker-compose.dockerhub.yml config >/dev/null

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub (optional)
        if: ${{ env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute beta tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(
            node -e "const fs=require('fs');const s=fs.readFileSync('apps/api/src/version.ts','utf8');const m=s.match(/APP_VERSION\\s*=\\s*'([^']+)'/);process.stdout.write((m&&m[1]?m[1].trim():'')||'0.0.0.0')"
          )"

          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/immaculaterr"
          DOCKERHUB_IMAGE="docker.io/ohmzii/immaculaterr"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"

          {
            echo "version=${VERSION}"
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "dockerhub_image=${DOCKERHUB_IMAGE}"
            echo "build_time=${BUILD_TIME}"
            echo "short_sha=${SHORT_SHA}"

            echo "tags<<EOF"
            echo "${GHCR_IMAGE}:beta"
            echo "${GHCR_IMAGE}:beta-v${VERSION}"
            echo "${GHCR_IMAGE}:beta-${SHORT_SHA}"
            if [[ -n "${DOCKERHUB_TOKEN:-}" && -n "${DOCKERHUB_USERNAME:-}" ]]; then
              echo "${DOCKERHUB_IMAGE}:beta"
              echo "${DOCKERHUB_IMAGE}:beta-v${VERSION}"
              echo "${DOCKERHUB_IMAGE}:beta-${SHORT_SHA}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
        env:
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push beta (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/immaculaterr/Dockerfile
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Immaculaterr
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.merge_commit_sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}-beta
            org.opencontainers.image.created=${{ steps.vars.outputs.build_time }}
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.version }}
            APP_BUILD_SHA=${{ github.event.pull_request.merge_commit_sha }}
            APP_BUILD_TIME=${{ steps.vars.outputs.build_time }}

  create-release:
    name: Create GitHub release
    needs:
      - build-and-push
    if: ${{ needs.build-and-push.outputs.is_beta != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merge commit (with tags)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Prepare release notes (custom format)
        shell: bash
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          PREV_TAG="$(
            {
              git tag --list 'v*' --sort=-version:refname \
                | grep -Fxv "v${VERSION}" \
                | head -n 1
            } || true
          )"

          if [ -n "${PREV_TAG}" ]; then
            RANGE_SPEC="${PREV_TAG}..HEAD"
          else
            RANGE_SPEC=""
          fi

          CHANGES_FILE="$(mktemp)"
          PRIORITY_CHANGES_FILE="$(mktemp)"
          SECONDARY_CHANGES_FILE="$(mktemp)"
          trap 'rm -f "${CHANGES_FILE}" "${PRIORITY_CHANGES_FILE}" "${SECONDARY_CHANGES_FILE}"' EXIT

          normalize_subject() {
            local value
            value="$(printf '%s' "$1" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
            value="$(printf '%s' "${value}" | sed -E 's/^[[:alpha:]][[:alnum:]_-]*(\([^)]+\))?!?:[[:space:]]*//')"
            value="$(printf '%s' "${value}" | sed -E 's/[[:space:]]+/ /g')"
            printf '%s' "${value}"
          }

          is_noise_subject() {
            local raw_lc
            raw_lc="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')"
            case "${raw_lc}" in
              chore\(badges\):*|chore:\ bump\ version*|docs:*|doc:*|ci:*|build:*)
                return 0
                ;;
            esac
            return 1
          }

          append_unique_change() {
            local line="$1"
            local target_file="$2"
            [ -n "${line}" ] || return 0
            if ! grep -Fxq -- "${line}" "${target_file}" 2>/dev/null; then
              printf '%s\n' "${line}" >> "${target_file}"
            fi
          }

          if [ -n "${RANGE_SPEC}" ]; then
            COMMIT_SUBJECTS="$(git log --no-merges --pretty=format:'%s' "${RANGE_SPEC}" || true)"
          else
            COMMIT_SUBJECTS="$(git log --no-merges --pretty=format:'%s' -n 30 || true)"
          fi

          while IFS= read -r raw_subject; do
            [ -n "${raw_subject}" ] || continue
            normalized_subject="$(normalize_subject "${raw_subject}")"
            [ -n "${normalized_subject}" ] || continue

            if printf '%s' "${raw_subject}" | grep -Eiq '^(feat|fix|sec|security|perf|refactor)(\([^)]+\))?!?:'; then
              append_unique_change "${normalized_subject}" "${PRIORITY_CHANGES_FILE}"
            elif ! is_noise_subject "${raw_subject}"; then
              append_unique_change "${normalized_subject}" "${SECONDARY_CHANGES_FILE}"
            fi
          done <<< "${COMMIT_SUBJECTS}"

          MAX_TOP_CHANGES=5
          MIN_TOP_CHANGES=3
          top_count=0

          append_bullets_from_file() {
            local source_file="$1"
            while IFS= read -r line; do
              [ -n "${line}" ] || continue
              printf -- '- %s\n' "${line}" >> "${CHANGES_FILE}"
              top_count=$((top_count + 1))
              if [ "${top_count}" -ge "${MAX_TOP_CHANGES}" ]; then
                return 0
              fi
            done < "${source_file}"
          }

          append_bullets_from_file "${PRIORITY_CHANGES_FILE}"
          if [ "${top_count}" -lt "${MAX_TOP_CHANGES}" ]; then
            append_bullets_from_file "${SECONDARY_CHANGES_FILE}"
          fi

          if [ "${top_count}" -lt "${MIN_TOP_CHANGES}" ] && [ -n "${PR_BODY:-}" ]; then
            while IFS= read -r pr_bullet; do
              normalized_pr_bullet="$(normalize_subject "${pr_bullet}")"
              [ -n "${normalized_pr_bullet}" ] || continue
              if ! grep -Fxq -- "- ${normalized_pr_bullet}" "${CHANGES_FILE}" 2>/dev/null; then
                printf -- '- %s\n' "${normalized_pr_bullet}" >> "${CHANGES_FILE}"
                top_count=$((top_count + 1))
              fi
              if [ "${top_count}" -ge "${MAX_TOP_CHANGES}" ]; then
                break
              fi
            done < <(
              printf '%s\n' "${PR_BODY}" \
                | sed 's/\r$//' \
                | awk '/^[-*] / { sub(/^[-*] /, ""); print }'
            )
          fi

          if [ ! -s "${CHANGES_FILE}" ]; then
            {
              echo "- ${PR_TITLE}"
              echo "- Merged pull request [#${PR_NUMBER}](https://github.com/${REPO}/pull/${PR_NUMBER})"
            } > "${CHANGES_FILE}"
            top_count=2
          else
            top_count="$(wc -l < "${CHANGES_FILE}" | tr -d ' ')"
          fi

          if [ -n "${PREV_TAG}" ]; then
            CHANGELOG_URL="https://github.com/${REPO}/compare/${PREV_TAG}..v${VERSION}"
            TOP_CHANGES_HEADING="## Top ${top_count} changes since ${PREV_TAG}"
          else
            CHANGELOG_URL="https://github.com/${REPO}/releases/tag/v${VERSION}"
            TOP_CHANGES_HEADING="## Top ${top_count} changes"
          fi

          cat > RELEASE_NOTES.md <<EOF
          ## What's Changed

          ${TOP_CHANGES_HEADING}

          $(cat "${CHANGES_FILE}")

          **Full Changelog**: ${CHANGELOG_URL}

          ## Updating

          ### Docker

          #### HTTP-only update (required)

          \`\`\`bash
          IMM_IMAGE="ghcr.io/ohmzi/immaculaterr:latest"
          APP_PORT=5454

          docker pull "\$IMM_IMAGE"
          docker rm -f Immaculaterr 2>/dev/null || true

          docker run -d \
            --name Immaculaterr \
            -p \${APP_PORT}:\${APP_PORT} \
            -e HOST=0.0.0.0 \
            -e PORT=\${APP_PORT} \
            -e TRUST_PROXY=1 \
            -e APP_DATA_DIR=/data \
            -e DATABASE_URL=file:/data/tcp.sqlite \
            -v immaculaterr-data:/data \
            --restart unless-stopped \
            "\$IMM_IMAGE"
          \`\`\`

          #### Optional HTTPS sidecar (can run anytime later)

          \`\`\`bash
          set -euo pipefail

          mkdir -p "\$HOME/immaculaterr"

          curl -fsSL -o "\$HOME/immaculaterr/caddy-entrypoint.sh" \
            "https://raw.githubusercontent.com/ohmzi/Immaculaterr/master/docker/immaculaterr/caddy-entrypoint.sh"
          curl -fsSL -o "\$HOME/immaculaterr/install-local-ca.sh" \
            "https://raw.githubusercontent.com/ohmzi/Immaculaterr/master/docker/immaculaterr/install-local-ca.sh"
          chmod +x "\$HOME/immaculaterr/caddy-entrypoint.sh" "\$HOME/immaculaterr/install-local-ca.sh"

          # Needed so install-local-ca.sh can import trust into Firefox profiles
          if ! command -v certutil >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y libnss3-tools
          fi

          docker pull caddy:2.8.4-alpine
          docker rm -f ImmaculaterrHttps 2>/dev/null || true

          # Keep named volumes stable so certs persist across restarts
          docker volume create immaculaterr-caddy-data >/dev/null
          docker volume create immaculaterr-caddy-config >/dev/null

          docker run -d \
            --name ImmaculaterrHttps \
            --network host \
            -e IMM_ENABLE_HTTP=false \
            -e IMM_ENABLE_HTTPS=true \
            -e IMM_HTTPS_PORT=5464 \
            -e IMM_INCLUDE_LOCALHOST=true \
            -e IMM_ENABLE_LAN_IP=true \
            -e APP_INTERNAL_PORT=5454 \
            -v "\$HOME/immaculaterr/caddy-entrypoint.sh:/etc/caddy/caddy-entrypoint.sh:ro" \
            -v immaculaterr-caddy-data:/data \
            -v immaculaterr-caddy-config:/config \
            --restart unless-stopped \
            caddy:2.8.4-alpine \
            /bin/sh /etc/caddy/caddy-entrypoint.sh

          # CRITICAL: trust the current Caddy local CA
          "\$HOME/immaculaterr/install-local-ca.sh"

          # Quick verify
          curl -I https://localhost:5464
          \`\`\`

          ### Portainer

          1. In Portainer: **Containers** → select **Immaculaterr**
          2. Click **Recreate**
          3. Enable **Re-pull image**
          4. Click **Recreate**
          EOF

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-and-push.outputs.version }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          name: Release v${{ needs.build-and-push.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          make_latest: true
